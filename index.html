<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拼豆图纸生成器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }
  h1 {
    font-size: 1.6rem;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #ff6b9d, #c44cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 20px; }

  .upload-area {
    border: 2px dashed #c44cff;
    border-radius: 16px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    width: 100%;
    max-width: 420px;
    transition: background 0.2s;
    margin-bottom: 16px;
  }
  .upload-area:hover { background: #2a2a4e; }
  .upload-area input { display: none; }
  .upload-icon { font-size: 3rem; margin-bottom: 8px; }
  .upload-text { color: #aaa; font-size: 0.9rem; }
  .preview-row {
    display: none;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
    width: 100%;
    max-width: 900px;
  }
  .preview-row.visible { display: flex; }

  .blueprint-card {
    background: #f5f5f0;
    border-radius: 12px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: #333;
  }
  .blueprint-card h3 { font-size: 0.85rem; color: #555; }
  .blueprint-card canvas {
    border: 1px solid #ccc;
    image-rendering: pixelated;
    max-width: 100%;
  }

  .controls {
    display: none;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
    width: 100%;
    max-width: 600px;
  }
  .controls.visible { display: flex; }
  .ctrl-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }
  .ctrl-group label { font-size: 0.78rem; color: #aaa; }
  .ctrl-group input[type="range"] {
    width: 120px;
    accent-color: #c44cff;
  }
  .ctrl-group span { font-size: 0.78rem; color: #c44cff; font-weight: bold; }
  .ctrl-group select {
    background: #2a2a4e;
    color: #e0e0e0;
    border: 1px solid #555;
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 0.85rem;
    cursor: pointer;
  }

  .actions {
    display: none;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
  }
  .actions.visible { display: flex; }

  .btn {
    padding: 10px 22px;
    border: none;
    border-radius: 10px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
  }
  .btn-primary {
    background: linear-gradient(135deg, #ff6b9d, #c44cff);
    color: white;
  }
  .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-secondary {
    background: #2a2a4e;
    color: #e0e0e0;
    border: 1px solid #555;
  }
  .btn-secondary:hover { background: #3a3a5e; }

  .palette {
    display: none;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    max-width: 600px;
    margin-bottom: 16px;
    padding: 12px;
    background: #22223a;
    border-radius: 12px;
  }
  .palette.visible { display: flex; }
  .palette-color {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 2px solid transparent;
    position: relative;
    cursor: default;
    font-size: 0.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  }
  .palette-color:hover::after {
    content: attr(data-name);
    position: absolute;
    bottom: 110%;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 0.65rem;
    white-space: nowrap;
    z-index: 10;
    pointer-events: none;
  }

  .legend {
    display: none;
    background: #22223a;
    border-radius: 12px;
    padding: 12px 16px;
    max-width: 600px;
    width: 100%;
    margin-bottom: 16px;
  }
  .legend.visible { display: block; }
  .legend h3 { font-size: 0.85rem; color: #aaa; margin-bottom: 8px; }
  .legend-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.75rem;
    color: #ccc;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 1px solid #555;
  }

  .info-bar {
    font-size: 0.78rem;
    color: #777;
    margin-bottom: 12px;
  }

  .bead-grid canvas { cursor: crosshair; }
  .hint { font-size: 0.75rem; color: #666; margin-top: 4px; }
</style>
</head>
<body>

<h1>🧩 拼豆图纸生成器</h1>
<p class="subtitle">上传任意图片 → 生成像素拼豆图纸（含镜像）</p>

<div class="upload-area" id="uploadArea">
  <input type="file" accept="image/*" id="fileInput">
  <div class="upload-icon">🖼️</div>
  <p class="upload-text">点击或拖拽图片上传</p>
</div>

<div class="info-bar" id="infoBar"></div>

<div class="controls" id="controls">
  <div class="ctrl-group">
    <label>宽度（珠数）</label>
    <input type="range" id="widthSlider" min="10" max="78" value="29">
    <span id="widthVal">29</span>
  </div>
  <div class="ctrl-group">
    <label>背景透明处理</label>
    <select id="bgMode">
      <option value="keep">保留原图</option>
      <option value="remove">去背景（白底）</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>镜像图纸</label>
    <select id="mirrorMode">
      <option value="both">正向+镜像</option>
      <option value="forward">仅正向</option>
      <option value="mirror">仅镜像</option>
    </select>
  </div>
</div>

<div class="actions" id="actions">
  <button class="btn btn-primary" id="generateBtn">🎨 生成图纸</button>
  <button class="btn btn-secondary" id="downloadBtn">📥 下载图纸</button>
  <button class="btn btn-secondary" id="resetBtn">🔄 重新上传</button>
</div>

<div class="preview-row" id="previewRow">
  <div class="blueprint-card">
    <h3>📐 正向图纸</h3>
    <canvas id="canvasForward"></canvas>
    <span class="hint">珠子在板上排列顺序</span>
  </div>
  <div class="blueprint-card">
    <h3>🔄 镜像图纸</h3>
    <canvas id="canvasMirror"></canvas>
    <span class="hint">从背面看的样子（熨烫面朝下）</span>
  </div>
</div>

<div class="palette" id="palette"></div>
<div class="legend" id="legend">
  <h3>🎨 颜色对照表（点击色块可复制颜色名）</h3>
  <div class="legend-grid" id="legendGrid"></div>
</div>

function findClosestColor(r, g, b, alpha) {
  if (alpha || (r > 240 && g > 240 && b > 240)) {
    // Treat near-white as white bead (or transparent if that mode is on)
    // Map very light colors to white bead
    return PERLER_COLORS[0]; // white
  }
  let best = null, bestDist = Infinity;
  for (const c of PERLER_COLORS) {
    if (c.alpha) continue;
    const d = (r-c.r)**2 + (g-c.g)**2 + (b-c.b)**2;
    if (d < bestDist) { bestDist = d; best = c; }
  }
  return best;
}

// ============ State ============
let originalImage = null;
let processedData = null; // 2D array of PERLER_COLORS entries
let gridW = 29, gridH = 29;
let beadRadius = 8; // px per bead on canvas
let bgMode = 'keep';
let mirrorMode = 'both';

const $ = id => document.getElementById(id);

// ============ Upload ============
const uploadArea = $('uploadArea');
const fileInput = $('fileInput');

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.background = '#2a2a4e'; });
uploadArea.addEventListener('dragleave', () => uploadArea.style.background = '');
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.style.background = '';
  const f = e.dataTransfer.files[0];
  if (f) loadFile(f);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      originalImage = img;
      $('uploadArea').style.display = 'none';
      $('controls').classList.add('visible');
      $('actions').classList.add('visible');
      $('previewRow').classList.remove('visible');
      $('palette').classList.remove('visible');
      $('legend').classList.remove('visible');
      $('infoBar').textContent = `已加载: ${img.width}×${img.height} ${file.name}`;
      autoSize();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function autoSize() {
  if (!originalImage) return;
  const img = originalImage;
  const aspect = img.height / img.width;
  // default 29 wide, auto height
  gridW = 29;
  gridH = Math.round(29 * aspect);
  if (gridH < 5) gridH = 5;
  if (gridH > 80) gridH = 80;
  $('widthSlider').value = gridW;
  $('widthVal').textContent = gridW;
  updateInfoBar();
}

$('widthSlider').addEventListener('input', e => {
  gridW = parseInt(e.target.value);
  $('widthVal').textContent = gridW;
  if (originalImage) {
    const aspect = originalImage.height / originalImage.width;
    gridH = Math.round(gridW * aspect);
    if (gridH < 5) gridH = 5;
    if (gridH > 80) gridH = 80;
  }
  updateInfoBar();
});

$('bgMode').addEventListener('change', e => bgMode = e.target.value);
$('mirrorMode').addEventListener('change', e => mirrorMode = e.target.value);

function updateInfoBar() {
  $('infoBar').textContent = `图纸尺寸: ${gridW} × ${gridH} = ${gridW*gridH} 粒 | ${(gridW*gridH/300).toFixed(1)} 分钟（参考）`;
}

// ============ Generate ============
$('generateBtn').addEventListener('click', generateBlueprints);
$('downloadBtn').addEventListener('click', downloadBlueprints);
$('resetBtn').addEventListener('click', () => location.reload());

function generateBlueprints() {
  if (!originalImage) return;

  // Scale image to grid
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = gridW;
  tmpCanvas.height = gridH;
  const ctx = tmpCanvas.getContext('2d');

  // Determine background fill for "remove" mode
  if (bgMode === 'remove') {
    // Flood fill white background by sampling corners
    const sampleCanvas = document.createElement('canvas');
    sampleCanvas.width = originalImage.width;
    sampleCanvas.height = originalImage.height;
    const sc = sampleCanvas.getContext('2d');
    sc.drawImage(originalImage, 0, 0);
    const topLeft = sc.getImageData(0, 0, 1, 1).data;
    const topRight = sc.getImageData(originalImage.width-1, 0, 1, 1).data;
    const botLeft = sc.getImageData(0, originalImage.height-1, 1, 1).data;
    // Use average as bg color
    const bgR = Math.round((topLeft[0]+topRight[0]+botLeft[0])/3);
    const bgG = Math.round((topLeft[1]+topRight[1]+botLeft[1])/3);
    const bgB = Math.round((topLeft[2]+botLeft[2]+topRight[2])/3);

    ctx.fillStyle = `rgb(${bgR},${bgG},${bgB})`;
    ctx.fillRect(0, 0, gridW, gridH);
  }

  ctx.drawImage(originalImage, 0, 0, gridW, gridH);
  const imgData = ctx.getImageData(0, 0, gridW, gridH);
  const pixels = imgData.data;

  // Process to bead colors
  processedData = [];
  const colorCount = {};
  const usedColors = [];

  for (let y = 0; y < gridH; y++) {
    const row = [];
    for (let x = 0; x < gridW; x++) {
      const i = (y * gridW + x) * 4;
      const r = pixels[i], g = pixels[i+1], b = pixels[i+2], a = pixels[i+3];

      let bead;
      if (bgMode === 'remove' && a < 128) {
        // transparent → find background-like color, we'll skip it as "background"
        bead = null;
      } else if (a < 30) {
        bead = null; // fully transparent
      } else {
        bead = findClosestColor(r, g, b, false);
      }

      row.push(bead);
      if (bead) {
        const key = bead.name;
        if (!colorCount[key]) { colorCount[key] = 0; usedColors.push(bead); }
        colorCount[key]++;
      }
    }
    processedData.push(row);
  }

  // Get color code for each bead (try by name first, then by hex)
  const getCode = (bead) => {
    if (!bead) return '';
    return COLOR_CODE[bead.name] || COLOR_CODE_HEX[bead.hex.toLowerCase()] || COLOR_CODE_HEX[bead.hex] || '?';
  };

  // Adjust bead radius to fit text labels
  beadRadius = Math.min(14, Math.max(7, Math.floor(540 / Math.max(gridW, gridH))));

  const showForward = mirrorMode !== 'mirror';
  const showMirror = mirrorMode !== 'forward';

  if (showForward) renderBlueprint($('canvasForward'), processedData, false, getCode);
  if (showMirror) renderBlueprint($('canvasMirror'), processedData, true, getCode);

  $('previewRow').classList.add('visible');

  // Render palette
  const palette = $('palette');
  palette.innerHTML = '';
  palette.classList.add('visible');
  usedColors.forEach(c => {
    const swatch = document.createElement('div');
    swatch.className = 'palette-color';
    swatch.style.background = c.hex;
    swatch.dataset.name = `${c.name} (${c.hex})`;
    swatch.title = `${c.name} ${colorCount[c.name]}粒`;
    palette.appendChild(swatch);
  });

  // Render legend
  const legend = $('legend');
  const legendGrid = $('legendGrid');
  legendGrid.innerHTML = '';
  legend.classList.add('visible');
  usedColors.forEach(c => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    const code = COLOR_CODE[c.name] || COLOR_CODE_HEX[c.hex.toLowerCase()] || '?';
    item.innerHTML = `<div class="legend-swatch" style="background:${c.hex}"></div>[${code}] ${c.name} ×${colorCount[c.name]}`;
    legendGrid.appendChild(item);
  });
}

function renderBlueprint(canvas, data, mirrored, getCode) {
  const W = gridW, H = gridH;
  const spacing = beadRadius * 2 + 2;
  const labelH = 24;
  const marginX = Math.max(10, beadRadius), marginY = Math.max(10, beadRadius) + labelH;
  canvas.width = W * spacing + marginX * 2;
  canvas.height = H * spacing + marginY * 2 + 16;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Label
  ctx.fillStyle = '#555';
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(
    mirrored ? '🔄 镜像图纸（从背面看）' : '📐 正向图纸（从正面看）',
    canvas.width / 2, 20
  );

  // Grid
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const bx = marginX + x * spacing;
      const by = marginY + y * spacing;
      const bead = mirrored ? data[H - 1 - y][W - 1 - x] : data[y][x];

      if (bead) {
        // Draw bead
        ctx.beginPath();
        ctx.arc(bx + spacing/2, by + spacing/2, beadRadius, 0, Math.PI*2);
        ctx.fillStyle = bead.hex;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.12)';
        ctx.lineWidth = 0.5;
        ctx.stroke();

        // Highlight for 3D effect
        ctx.beginPath();
        ctx.arc(bx + spacing/2 - beadRadius*0.25, by + spacing/2 - beadRadius*0.25, beadRadius*0.35, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.fill();

        // Color code label (white on dark beads, black on light)
        const code = getCode(bead);
        if (code && beadRadius >= 7) {
          const lum = (parseInt(bead.hex.slice(1,3),16)*0.299 +
                       parseInt(bead.hex.slice(3,5),16)*0.587 +
                       parseInt(bead.hex.slice(5,7),16)*0.114);
          ctx.fillStyle = lum < 128 ? 'rgba(255,255,255,0.85)' : 'rgba(0,0,0,0.6)';
          ctx.font = `bold ${Math.max(6, beadRadius * 0.5)}px monospace`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(code, bx + spacing/2, by + spacing/2 + 0.5);
        }
      } else {
        // Empty hole marker
        ctx.beginPath();
        ctx.arc(bx + spacing/2, by + spacing/2, beadRadius * 0.5, 0, Math.PI*2);
        ctx.strokeStyle = '#ddd';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }
  }

  // Grid lines
  ctx.strokeStyle = '#e8e8e8';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= W; x++) {
    const gx = marginX + x * spacing;
    ctx.beginPath();
    ctx.moveTo(gx, marginY);
    ctx.lineTo(gx, marginY + H * spacing);
    ctx.stroke();
  }
  for (let y = 0; y <= H; y++) {
    const gy = marginY + y * spacing;
    ctx.beginPath();
    ctx.moveTo(marginX, gy);
    ctx.lineTo(marginX + W * spacing, gy);
    ctx.stroke();
  }

  // Row/col numbers
  ctx.fillStyle = '#bbb';
  ctx.font = '8px sans-serif';
  ctx.textAlign = 'center';
  for (let x = 0; x < W; x++) {
    if (x % 5 === 0) {
      ctx.fillText(String(x+1), marginX + x * spacing + spacing/2, marginY - 3);
    }
  }
  ctx.textAlign = 'right';
  for (let y = 0; y < H; y++) {
    if (y % 5 === 0) {
      ctx.fillText(String(y+1), marginX - 3, marginY + y * spacing + spacing/2 + 3);
    }
  }

  // Dimension label
  ctx.fillStyle = '#999';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`尺寸: ${W}×${H} 粒 | 每色珠直径约5mm`, canvas.width/2, canvas.height - 4);
}

// ============ Download ============
function downloadBlueprints() {
  if (!processedData) return;
  const showForward = mirrorMode !== 'mirror';
  const showMirror = mirrorMode !== 'forward';

  if (showForward) downloadCanvas($('canvasForward'), '拼豆图纸_正向');
  if (showMirror) downloadCanvas($('canvasMirror'), '拼豆图纸_镜像');
}

function downloadCanvas(canvas, name) {
  const link = document.createElement('a');
  link.download = `${name}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
